# RumahKitaOreSpectator v1.0.3
# /spec2 = spectator stealth untuk admin + marker ore yang terlihat tembus block.

# Kenapa v1.0.3?
# - v1.0.2 marker kadang tidak kelihatan karena block display berada di dalam block.
# - v1.0.3 pakai TextDisplay see-through + glowing, jadi marker lebih gampang terlihat.
# - Placeholder %filter% dan %radius% sudah diperbaiki.

general:
  enabled: true

  # Update marker tiap berapa tick. 20 tick = 1 detik.
  # Jangan terlalu kecil biar server ringan.
  update-interval-ticks: 60

  # Radius horizontal default saat /spec2 aktif.
  default-radius: 48
  max-radius: 128

  # Radius atas-bawah. Ini penting karena ore sering jauh di bawah player.
  default-vertical-radius: 96
  max-vertical-radius: 192

  default-filter: "valuable"
  max-markers: 350
  restore-gamemode-on-disable: true

  # Kalau true, saat /spec2 on akan kasih info scan detail.
  debug-scan-on-enable: false

markers:
  # symbol = cuma simbol ◆
  # short  = ◆ DIAMOND 20m
  # full   = DIAMOND 20m
  text-mode: "short"
  symbol: "◆"

  # Default false: marker hanya kelihatan untuk admin yang pakai /spec2.
  # Kalau true, staff dengan permission rumahkita.orespec.see bisa lihat marker admin lain.
  staff-can-see-other-markers: false

presets:
  deep:
    radius: 64
    vertical-radius: 192
    filter: "valuable"

stealth:
  enabled: true
  fake-quit-on-enable: true
  fake-quit-message: "&e%player% left the game"
  fake-join-on-disable: true
  fake-join-message: "&e%player% joined the game"
  hide-from-players: true
  see-permission: "rumahkita.orespec.see"
  hide-from-online-commands: true
  online-command-aliases:
    - "online"
    - "list"
    - "who"
    - "players"
  online-message-header: "&6Online Players &7(&e%online%&7/&e%max%&7):"
  online-message-empty: "&7Tidak ada player online yang terlihat."
  online-name-color: "&f"
  online-separator: "&7, "

filters:
  valuable:
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - ANCIENT_DEBRIS
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
  diamond:
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
  netherite:
    - ANCIENT_DEBRIS
  emerald:
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
  all:
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    - NETHER_GOLD_ORE
    - NETHER_QUARTZ_ORE
    - ANCIENT_DEBRIS

messages:
  prefix: ""
  no-permission: "&cYou don't have permission."
  already-enabled: "&eSpec2 is already active. Markers: &f%count% &7| Filter: &f%filter% &7| Radius: &f%radius%/%vradius%"
  enabled: "&aSpec2 activated. Markers: &f%count% &7| Filter: &f%filter% &7| Radius: &f%radius%/%vradius%"
  disabled: "&cSpec2 disabled. You are now visible."
  no-markers-tip: "&eMarkers are 0. Fly closer to the ground, or use &f/rks spec filter all &eand &f/rks spec deep&e."
  reloaded: "&aOreSpectator config reloaded."
  status: "&7Your Spec2: &f%active% &7| Markers: &f%count% &7| Found: &f%found% &7| Filter: &f%filter% &7| Radius: &f%radius%/%vradius% &7| All sessions: &f%sessions%"
  radius-set: "&aHorizontal radius set to &f%radius%&a. Markers: &f%count%"
  vradius-set: "&aVertical radius set to &f%vradius%&a. Markers: &f%count%"
  filter-set: "&aFilter set to &f%filter%&a. Markers: &f%count%"
  deep-set: "&aDeep mode activated. Markers: &f%count% &7| Filter: &f%filter% &7| Radius: &f%radius%/%vradius%"
  scan-done: "&aScan complete. Visible markers: &f%count% &7| Ores found: &f%found% &7| Filter: &f%filter%"
  list-header: "&bAdmins using /rks spec:"
  list-empty: "&7No admins are currently using /rks spec."
