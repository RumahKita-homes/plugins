# soon it will be possible to translate all messages
messages:
  Main:
    no_access: '<gray>Missing permission to this module: <yellow><permission>'
    disabled_module: <gray>Module <yellow><module> <gray>is disabled, administration
      must enable this feature!
    player_only: <gray>Command can be only executed by player!
  
  
  RedstoneLimiter:
    alert: <gray>Blocked <yellow><ticks> <gray>redstone ticks at chunk in <gradient:#c48d00:#fffb00><location></gradient><gray>!
    cooldown: <gray>You can use <material> again in <gradient:#c48d00:#fffb00><cooldown></gradient><gray>ms.
  
  WorldCleaner:
    # Message format -> "second=message"
    countingdown:
    - 15=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 10=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 5=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 4=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 3=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 2=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 1=<gray>Clearing items & entities in <color:#ff8800><remaining>s<gray>!
    - 0=<gray>Cleared <color:#ff8800><items> <gray>items & <color:#ff8800><creatures> <gray>mobs!
    
    items:
      # Abyss is the place where all deleted items go, and players can get them back by typing the /abyss command
      abyss:
        close: <gray>The abyss has been successfully closed!
        open: '<gray>The abyss has been successfully opened, recover your items: <yellow>/abyss'
        empty: <gray>The abyss is <blue>empty<gray>, wait until it opens again!
        closed: <gray>The abyss is <red>closed<gray>, wait until it opens again!
        opened: <gray>The abyss inventory was successfully <green>opened<gray>!
        gui:
          name: <white>Abyss! <dark_gray>(<gray>page <page><dark_gray>)
          previous: <dark_gray>← <red><b>PREVIOUS PAGE!</b>
          next: <dark_gray>→ <green><b>NEXT PAGE!</b>
