guild-war:
  enabled: true
  countdown-seconds: 10
  duration-seconds: 300
  challenge-expire-seconds: 120
  reward-emerald: 2
  min-online-per-guild: 1
  teleport-all-online-members: true
  keep-inventory-during-war: true
  keep-level-during-war: true
  respawn-continue: false
  restore-location-after-war: true
  prevent-friendly-fire: true
  reset-health-food-on-start: true
  announce-kills: true
  actionbar: true
  command-blocker:
    enabled: true

    # true = semua command diblok saat player sedang ikut Guild War,
    # kecuali command yang ada di allowed-commands.
    # Ini mencegah /home, /spawn, /warp, /back, /tpa, /rtp, dll buat kabur.
    block-all: true

    # Command yang masih boleh dipakai saat war.
    # Jangan masukkan home/spawn/warp/back/tpa di sini.
    allowed-commands:
      - guild
      - guildchat
      - gc
      - gchat
      - msg
      - tell
      - w
      - r
      - reply

    # Dipakai kalau block-all: false.
    blocked-commands:
      - home
      - homes
      - sethome
      - spawn
      - warp
      - warps
      - back
      - tpa
      - tpahere
      - tpaccept
      - tpdeny
      - rtp
      - wild
      - shop
      - market
      - ec
      - enderchest
      - fly
      - gamemode
      - gm
      - suicide
      - kill

    block-message: "&cYou are currently in a Guild War, commands are restricted to prevent escaping. Finish the war first!"
  arena:
    world: world
    side1:
      x: 4245.5
      y: 131.0
      z: 2334.5
      yaw: 90.0
      pitch: 0.0
    side2:
      x: 4321.5
      y: 131.0
      z: 2334.5
      yaw: -90.0
      pitch: 0.0


# =======================================
# Admin Tools Configuration
# =======================================


# File data yang akan dicari di plugins/RumahKitaGuilds/
# Kalau plugin guild kamu pakai nama file lain, tambahin di sini.
data-files:
  - "guilds.yml"
  - "data.yml"
  - "guild-data.yml"
  - "storage.yml"

# Root path umum tempat daftar guild disimpan.
# Contoh: guilds.NamaGuild atau data.guilds.NamaGuild
root-paths:
  - "guilds"
  - "data.guilds"
  - "storage.guilds"
  - ""

# Command guild yang akan diblok kalau guild di-freeze admin.
frozen-guild-command-block:
  enabled: true
  commands:
    - "/guild"
    - "/g"
    - "/clan"
    - "/rkgalaxy"
    - "/rkguild"
  blocked-subcommands:
    - "invite"
    - "kick"
    - "sethome"
    - "delhome"
    - "home"
    - "claim"
    - "unclaim"
    - "war"
    - "rename"
    - "prefix"
    - "promote"
    - "demote"
    - "transfer"
    - "leave"

backup:
  enabled: true
  folder: "backups"




