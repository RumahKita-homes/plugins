name: RumahKitaGuilds
version: 2.3.3
main: id.rumahkita.guilds.RumahKitaGuildsPlugin
api-version: 2.3.3
author: HansM
description: Guild system for RumahKita S2 with guild war, guild wallet, roles, guild home, guild chat, PlaceholderAPI, and GUI.
softdepend:
  - PlaceholderAPI

commands:
  guild:
    description: Main RumahKita Guild command.
    usage: /guild
    aliases: [g]
  guildchat:
    description: Toggle or send private guild chat.
    usage: /guildchat [message]
    aliases: [gc, gchat]
  rkg:
    description: Admin tools and GUI for RumahKita guilds.
    usage: /rkg help
    aliases: [rkgadmin, guildadmin, rkga, rkguilds]

permissions:
  rumahkitaguilds.use:
    description: Allows basic guild commands.
    default: true
  rumahkitaguilds.create:
    description: Allows creating guilds.
    default: true
  rumahkitaguilds.admin:
    description: Allows admin guild commands.
    default: op
  rumahkitaguilds.chatformat:
    description: Allows guild prefix in public chat when enabled.
    default: true
  rumahkitaguilds.spy:
    description: Allows seeing guild chat spy when enabled.
    default: op

  rumahkitaguilds.war.admin:
    description: Allows force stopping guild wars.
    default: op

  rumahkitaguilds.war.commandbypass:
    description: Bypass command block during Guild War.
    default: op

  rumahkita.guild.admin:
    description: Access all guild admin tools.
    default: op
  rumahkita.guild.admin.disband:
    description: Disband guilds by force.
    default: op
  rumahkita.guild.admin.home:
    description: Manage guild homes by force.
    default: op
  rumahkita.guild.admin.player:
    description: Manage guild players by force.
    default: op
  rumahkita.guild.admin.freeze:
    description: Freeze/unfreeze guilds.
    default: op
  rumahkita.guild.admin.reload:
    description: Reload admin tools.
    default: op
  rumahkita.guild.admin.bypass:
    description: Bypass frozen guild command block.
    default: op
