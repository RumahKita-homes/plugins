name: RumahKitaMinigames
version: 1.0.0
main: id.rumahkita.minigames.RumahKitaMinigamesPlugin
api-version: '1.16'
author: RumahKita
description: Minigames module combining Games, CaptureFlag, PvP, and Fishing.
softdepend:
- RumahKitaEconomyV2
- Vault
- PlaceholderAPI
commands:
  coinflip:
    description: Main lempar koin taruhan uang
    aliases:
    - cf
    - rkcf
    usage: /coinflip <create/join/cancel> [amount] [heads/tails]
  rps:
    description: Main batu gunting kertas taruhan uang
    aliases:
    - suwit
    - rps
    usage: /rps <create/join/cancel> [amount/player] [batu/gunting/kertas]
  rkg:
    description: Command admin RumahKitaGames
    permission: rumahkita.admin
    usage: /rkg reload
  rkctf:
    description: RumahKita Capture Flag / Capture Point event command.
    usage: /rkctf help
    aliases:
    - ctf
    - captureflag
  pvp:
    description: RumahKita PvP 1v1 arena system
    usage: /pvp
    aliases:
    - duel
    - rkduel
    - rkpvp
  fish:
    description: RumahKita custom fishing command
    usage: /fish
    aliases:
    - mancing
    - fishing
  fishadmin:
    description: RumahKita fishing admin command
    usage: /fishadmin
    aliases:
    - rfadmin
permissions:
  rumahkita.ctf.use:
    description: Allows player to join CTF event.
    default: true
  rumahkita.ctf.admin:
    description: Allows admin to manage CTF event.
    default: op
  rumahkita.pvp.use:
    default: true
  rumahkita.pvp.admin:
    default: op
  rumahkita.pvp.bypass:
    default: op
  rumahkitafishing.sell:
    default: true
  rumahkitafishing.shop:
    default: true
  rumahkitafishing.stats:
    default: true
  rumahkitafishing.top:
    default: true
  rumahkitafishing.admin:
    default: op
  rumahkitafishing.bonus.vip:
    default: false
