name: RumahKitaSecurity
version: 1.0.0
main: id.rumahkita.security.RumahKitaSecurityPlugin
api-version: '1.16'
author: RumahKita
description: Security module combining AntiCheat, AntiXray, Bans, and RamGuard.
softdepend: []
commands:
  rkac:
    description: RumahKita AntiCheat command.
    usage: /rkac
    aliases:
    - rumahkitaac
    - ac
  rkxray:
    description: RumahKita AntiXray command.
    usage: /rkxray <status|reload|check|top|reset|freeze|unfreeze|logs|on|off>
  rksec:
    description: Main strict ban command.
    usage: /rksec <status|reload|ban|banip|unban|check|history|list>
  rkban:
    description: Strict ban player.
    usage: /rkban <player> [reason]
  rkipban:
    description: Ban IP or CIDR subnet.
    usage: /rkipban <ip|cidr> [reason]
  rkunban:
    description: Unban UUID, name, IP, or CIDR.
    usage: /rkunban <uuid|name|ip|cidr>
  ramguard:
    description: Monitor dan cleanup RAM server RumahKita S2
    usage: /ramguard <status|cleanup|restore|reload>
    aliases:
    - rkg
  spec2:
    description: Spectator ore vision admin mode.
    usage: /spec2 <on|off|toggle|scan|radius|vradius|deep|filter|list|reload|status>
    aliases:
    - orespec
    - rkorespec
    - rkore
permissions:
  rumahkita.anticheat.admin:
    description: Allows managing RumahKitaAntiCheat.
    default: op
  rumahkita.anticheat.notify:
    description: Receives AntiCheat alerts.
    default: op
  rumahkita.anticheat.bypass:
    description: Bypasses AntiCheat checks.
    default: op
  rumahkita.antixray.admin:
    default: op
  rumahkita.antixray.notify:
    default: op
  rumahkita.antixray.bypass:
    default: false
  rumahkita.securityban.admin:
    default: op
  rumahkita.securityban.bypass:
    default: false
  rumahkitaramguard.admin:
    description: Akses semua command RumahKitaRamGuard
    default: op
  rumahkitaramguard.notify:
    description: Menerima notifikasi RAM guard
    default: op
  rumahkita.orespec.use:
    description: Use /spec2 ore spectator mode.
    default: op
  rumahkita.orespec.admin:
    description: Reload and manage OreSpectator.
    default: op
  rumahkita.orespec.see:
    description: See admins in spec2 stealth and see full /online list.
    default: op
