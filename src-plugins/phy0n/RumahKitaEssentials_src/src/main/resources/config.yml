# ==================================================
# RumahKita Admin - Configuration
# ==================================================

# Server Auto-Restart Times (HH:mm format)
# The timezone relies on the server's local machine timezone.
restart-times:
  - "06:59"
  - "18:59"

# How long before restart should warnings appear?
# Use 'm' for minutes, 's' for seconds
warnings:
  - "10m"
  - "5m"
  - "1m"
  - "30s"
  - "10s"
  - "5s"
  - "4s"
  - "3s"
  - "2s"
  - "1s"

settings:
  anti-vpn:
    enabled: true
    kick-message: "&c&lConnection Refused!\n\n&fOur Security System detected the use of a &e&lVPN / Proxy / Hosting&f.\n\n&7Please disable your VPN to join the server.\n&7If this is a mistake, contact an Admin."
  warn:
    max-warnings: 3
  jail:
    distance-limit: 10

messages:
  no-permission: "&cUnknown command. Type \"/help\" for help."
  restart:
    kick-message: "&cServer is restarting! Please rejoin in a few minutes."
    warning-message: "&8[&c&l!&8] &c&lRESTART &8\u00bb &eServer is restarting in &c&l%time%&e!"
  maintenance:
    kick-message: "&cThe server is currently under Maintenance.\n&fPlease try again later."
    enable-broadcast: "&4&lSERVER MAINTENANCE ENABLED!"
    disable-broadcast: "&a&lMAINTENANCE COMPLETE!"
  warn:
    title: "&4&lWARNING!"
    kick-message: "&cYou have been kicked for reaching maximum warnings.\n&fReason: &e%reason%"
  jail:
    jailed: "&cYou have been jailed by an Admin!"
    unjailed: "&aYou have been unjailed. Don't break the rules again!"
    cannot-escape: "&cYou cannot escape Jail!"
  mute:
    muted: "&cYou have been muted by an Admin! You cannot send messages."
    unmuted: "&aYou have been unmuted. You can chat again."
    cannot-chat: "&cYou cannot send messages because you are muted by an Admin."
  freeze:
    frozen: "&cYou have been frozen by an Admin!"
    unfrozen: "&aYou have been unfrozen."

# (Internal Data)
# ips:
# jailed_players:
# warnings:
# warnings:
# RumahKitaUtilities v1.1.0
# Fitur:
# 1) Sleep skip tanpa harus semua player tidur
# 2) Carry player/entity seperti mod carrying versi plugin server-side
# 3) Bansos tiap Jumat + info Discord webhook

sleep:
  enabled: true

  # SINGLE_PLAYER = cukup 1 player tidur langsung skip malam.
  # PERCENTAGE = butuh persentase player tidur.
  mode: SINGLE_PLAYER
  required-percentage: 25
  min-sleeping-players: 1

  worlds:
    - world

  count-survival: true
  count-adventure: true
  ignore-creative: true
  ignore-spectator: true

  skip-night: true
  clear-thunder: true
  clear-rain: true

  delay-after-bed-enter-ticks: 20
  set-time: 0

  title-enabled: false
  title: "&b&lGood Morning!"
  subtitle: "&7Night skipped because &f%sleeper% &7is sleeping."
  broadcast: "&f%sleeper% &7is sleeping. Night skipped."

carry:
  enabled: true

  max-distance: 4.0
  allow-carry-player: true
  allow-carry-entity: true

  # Sneak + klik kanan entity untuk carry mob/player.
  sneak-right-click-entity: true

  # Player yang menggendong bisa shift untuk melepas.
  drop-when-carrier-sneak: true

  # Player yang digendong bisa shift untuk turun.
  drop-when-passenger-sneak: true

  cancel-damage-while-carrying: false

  # Mode aman:
  # Kalau true, hanya entity di allowed-entity-types yang bisa digendong.
  # Zombie, golem, villager, warden, skeleton, creeper, monster, boss, dll otomatis tidak bisa.
  allowed-entity-whitelist-enabled: true

  # Hewan kecil / masuk akal untuk digendong.
  # Kalau mau nambah, tulis nama EntityType Minecraft/Paper.
  allowed-entity-types:
    - CHICKEN
    - RABBIT
    - CAT
    - OCELOT
    - PARROT
    - FOX
    - AXOLOTL
    - FROG
    - TURTLE
    - PIG
    - SHEEP
    - COW
    - MOOSHROOM
    - GOAT
    - WOLF
    - ARMADILLO

  # Entity berat / tidak masuk akal tetap diblok walaupun whitelist dimatikan.
  blocked-entity-types:
    - PLAYER # tidak dipakai untuk player carry, player diatur dari allow-carry-player
    - ZOMBIE
    - ZOMBIE_VILLAGER
    - HUSK
    - DROWNED
    - SKELETON
    - STRAY
    - WITHER_SKELETON
    - CREEPER
    - SPIDER
    - CAVE_SPIDER
    - ENDERMAN
    - BLAZE
    - GHAST
    - SLIME
    - MAGMA_CUBE
    - WITCH
    - PILLAGER
    - VINDICATOR
    - EVOKER
    - RAVAGER
    - VEX
    - WARDEN
    - IRON_GOLEM
    - SNOW_GOLEM
    - VILLAGER
    - WANDERING_TRADER
    - HORSE
    - DONKEY
    - MULE
    - LLAMA
    - TRADER_LLAMA
    - CAMEL
    - SNIFFER
    - POLAR_BEAR
    - PANDA
    - HOGLIN
    - ZOGLIN
    - ENDER_DRAGON
    - WITHER

  # Proteksi land/claim.
  # Kalau target entity berada di claim orang lain, player tidak bisa gendong.
  protection:
    enabled: true
    deny-if-hook-error: true
    debug: false

    griefprevention:
      enabled: true

  allowed-worlds:
    - world

  messages:
    picked-player: "&aYou are carrying &f%target%&a."
    picked-entity: "&aYou are carrying &f%target%&a."
    dropped: "&eCarry dropped."
    disabled: "&cCarry is currently disabled."
    no-permission: "&cYou don't have permission."
    too-far: "&cTarget is too far."
    blocked: "&cThat entity cannot be carried."
    too-heavy: "&cThat entity is too heavy to carry."
    land-denied: "&cYou cannot pickup entities in someone else's claim."
    not-found: "&cTarget not found."
    only-player: "&cThis command can only be used by players."

bansos:
  enabled: true

  # Default Jumat jam 20:00 WIB.
  timezone: "Asia/Jakarta"
  day-of-week: "FRIDAY"
  time: "20:00"

  # Kalau server baru nyala lewat jam bansos di hari yang sama, tetap jalankan sekali.
  catch-up-same-day: true

  rewards:
    - material: DIAMOND
      amount: 5
      display: "5 Diamond"
    - material: EMERALD
      amount: 10
      display: "10 Emerald"
    - material: COOKED_BEEF
      amount: 20
      display: "20 Beef"

  broadcast-enabled: true
  broadcast-lines:
    - "&8&m--------------------------------"
    - "&a&lRUMAHKITA FRIDAY REWARDS"
    - "&fAll online players received:"
    - "&b5 Diamond &7+ &a10 Emerald &7+ &c20 Beef"
    - "&7Thank you for playing on RumahKita S2!"
    - "&8&m--------------------------------"

  title-enabled: false
  title: "&a&lFRIDAY REWARDS"
  subtitle: "&b+5 Diamond &a+10 Emerald &c+20 Beef"

  discord:
    enabled: true

    # Demi aman, paste webhook kamu di sini setelah plugin terpasang.
    # Jangan upload config yang berisi webhook ke publik.
    webhook-url: "PASTE_WEBHOOK_DISCORD_DI_SINI"

    role-mention: "<@&1461386284726620273>"
    role-id: "1461386284726620273"

    username: "RumahKita Bansos"
    avatar-url: ""

    content: "<@&1461386284726620273> 🎁 **RumahKita S2 Friday Rewards distributed!**"
    embed-title: "🎁 Friday Rewards RumahKita S2"
    embed-description: "All online players received **5 Diamond**, **10 Emerald**, and **20 Beef**."
    embed-color: 5763719

messages:
  prefix: "&8[&bRumahKitaUtilities&8] "
  reloaded: "&aConfig successfully reloaded."
  enabled: "&aFeature enabled."
  disabled: "&cFeature disabled."
  no-permission: "&cYou don't have permission."

vanish:
  enabled: true

  # Simpan status vanish ke plugins/RumahKitaUtilities/vanish.yml.
  # Kalau server restart, player yang masih vanish tetap vanish saat join lagi.
  persist: true

  # Ini inti fitur: tidak pakai potion invisibility, jadi tidak ada particle potion.
  # Sistem pakai hidePlayer server-side, aman untuk Java + Bedrock/Geyser.
  no-potion-particle: true

  # Kalau player punya efek invisibility dari plugin lain/potion, hapus saat /rkvanish supaya tidak muncul particle.
  remove-invisibility-effect: true

  # Hide join/quit message untuk player yang sedang vanish.
  hide-join-quit-message: true

  # Cegah player vanish pickup item, biar tidak kelihatan item tiba-tiba hilang.
  block-item-pickup: true

  # Mob tidak target player vanish.
  prevent-mob-target: true

  # Kalau true, player vanish tidak bisa chat supaya tidak ketahuan.
  block-chat-while-vanished: true

  # Biar tidak dorong-dorongan / tabrakan aneh.
  disable-collision: true

  # Staff dengan permission ini tetap bisa lihat player vanish.
  see-permission: "rumahkita.vanish.see"

  notify-staff: true

  messages:
    enabled: "&8[&7RKVanish&8] &aVanish ON. You are now invisible without particles."
    disabled: "&8[&7RKVanish&8] &cVanish OFF. You are now visible."
    feature-disabled: "&8[&7RKVanish&8] &cRKVanish is currently disabled."
    chat-blocked: "&8[&7RKVanish&8] &cYou are vanished. Chat is blocked."
    toggled-other: "&8[&7RKVanish&8] &aRKVanish &f%player%&a: &f%state%"
    staff-notify: "&8[&7RKVanish&8] &f%player% &7%state%"
    list: "&8[&7RKVanish&8] &bVanished: &f%list%"
