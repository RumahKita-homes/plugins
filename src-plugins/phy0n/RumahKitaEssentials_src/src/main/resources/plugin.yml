name: RumahKitaEssentials
version: 1.0.0
main: id.rumahkita.essentials.RumahKitaEssentialsPlugin
api-version: '1.16'
author: RumahKita
description: Essentials module combining Admin, Warps, and Utilities.
softdepend:
- PlaceholderAPI
- Vault
- RumahKitaEconomyV2
commands:
  rka:
    description: Main command for RumahKita Admin
    permission: rumahkita.admin
    permission-message: Unknown command. Type "/help" for help.
    usage: /rka
  sc:
    description: Staff Chat
    permission: rumahkita.admin
    permission-message: Unknown command. Type "/help" for help.
    usage: /sc <message>
  pwarp:
    description: Player Warp Commands
    aliases:
    - pw
    - playerwarp
    usage: /pwarp <set/delete/list>
  rtp:
    description: Random teleport to a random location
    aliases:
    - tpr
    usage: /rtp
  back:
    description: Return to previous location or death point
    usage: /back
  rkw:
    description: RumahKitaWarps Admin Command
    usage: /rkw
    permission: rumahkitawarps.admin
  warp:
    description: Open warp menu
    aliases:
    - warps
    usage: /warp [nama]
  setwarp:
    description: Create server warp
    usage: /setwarp <nama>
    permission: rumahkitawarps.admin
  delwarp:
    description: Delete server warp
    usage: /delwarp <nama>
    permission: rumahkitawarps.admin
  editwarp:
    description: Edit warp (icon, slot, lore)
    usage: /editwarp <nama> <icon/slot/lore> <value>
    permission: rumahkitawarps.admin
  rksleep:
    description: RumahKita Sleep command.
    usage: /rksleep <status|reload|on|off>
  carry:
    description: Carry player/entity command.
    usage: /carry <player|drop|toggle>
  rkcarry:
    description: RumahKita Carry admin/user command.
    usage: /rkcarry <toggle|drop|reload>
  rkbansos:
    description: RumahKita Friday bansos command.
    usage: /rkbansos <status|now|reload>
  rkvanish:
    description: Particle-free RumahKita vanish.
    usage: /rkvanish [player|list|reload]
    aliases:
    - rkv
  ping:
    description: Cek ping internet kamu
    usage: /ping [player]
  tps:
    description: Cek TPS server
    usage: /tps
permissions:
  rumahkita.utilities.admin:
    description: Admin access to all RumahKitaUtilities commands.
    default: op
  rumahkita.sleep.use:
    description: Allow player to trigger sleep skip.
    default: true
  rumahkita.carry.use:
    description: Allow player to use carry.
    default: true
  rumahkita.carry.admin:
    description: Carry admin.
    default: op
  rumahkita.carry.bypassland:
    description: Bypass land claim protection for carry.
    default: op
  rumahkita.bansos.admin:
    description: Bansos admin.
    default: op
  rumahkita.vanish.use:
    description: Allow using /rkvanish for self.
    default: op
  rumahkita.vanish.others:
    description: Allow vanishing other players.
    default: op
  rumahkita.vanish.see:
    description: Allow seeing vanished players.
    default: op
  rumahkita.vanish.admin:
    description: Allow vanish admin commands.
    default: op
  rumahkita.vanish.chatbypass:
    description: Allow chatting while vanished if chat block is enabled.
    default: op
